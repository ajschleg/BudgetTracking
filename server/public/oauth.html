<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Completing Connection...</title>
  <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #1a1a1a;
      color: #fff;
    }
    .loading { text-align: center; }
    .loading p { color: #888; margin-top: 12px; }
    .error { color: #ff6b6b; text-align: center; }
  </style>
</head>
<body>
  <div class="loading" id="status">
    <p>Completing bank connection...</p>
  </div>

  <script>
    const SERVER_URL = window.location.origin;
    const OAUTH_REDIRECT_URI = `${SERVER_URL}/oauth.html`;

    // Check if WKWebView passed a receivedRedirectUri query param
    const params = new URLSearchParams(window.location.search);
    const externalRedirectURI = params.get('receivedRedirectUri');

    // App auth token from the WKWebView wrapper (same pattern as link.html).
    const APP_TOKEN = params.get('token');

    function authHeaders(extra = {}) {
      const headers = { 'Content-Type': 'application/json', ...extra };
      if (APP_TOKEN) headers['X-App-Token'] = APP_TOKEN;
      return headers;
    }

    async function completeOAuth() {
      try {
        // Get a new link token with the same redirect_uri used originally
        const response = await fetch(`${SERVER_URL}/api/link/create`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ redirect_uri: OAUTH_REDIRECT_URI }),
        });
        const { link_token } = await response.json();

        // Use the external redirect URI if passed from the app, otherwise use current URL
        const receivedURI = externalRedirectURI || window.location.href;

        // Reinitialize Plaid Link in OAuth completion mode
        const handler = Plaid.create({
          token: link_token,
          receivedRedirectUri: receivedURI,
          onSuccess: async (publicToken, metadata) => {
            document.getElementById('status').textContent = 'Connecting account...';

            const exchangeResponse = await fetch(`${SERVER_URL}/api/link/exchange`, {
              method: 'POST',
              headers: authHeaders(),
              body: JSON.stringify({
                public_token: publicToken,
                institution: metadata.institution,
              }),
            });
            const result = await exchangeResponse.json();

            // Notify the macOS app via message handler (if in WKWebView)
            if (window.webkit?.messageHandlers?.plaidCallback) {
              window.webkit.messageHandlers.plaidCallback.postMessage(
                JSON.stringify({ event: 'success', data: result })
              );
            } else {
              // If opened in browser (production OAuth flow), redirect back to app
              window.location.href = `budgettracking://plaid-oauth-success?item_id=${encodeURIComponent(result.item_id)}&institution=${encodeURIComponent(result.institution)}&accounts=${encodeURIComponent(JSON.stringify(result.accounts))}`;
            }
          },
          onExit: (err) => {
            if (window.webkit?.messageHandlers?.plaidCallback) {
              window.webkit.messageHandlers.plaidCallback.postMessage(
                JSON.stringify({ event: 'exit', error: err?.display_message || null })
              );
            } else {
              window.location.href = 'budgettracking://plaid-oauth-exit';
            }
          },
        });

        handler.open();
      } catch (error) {
        const status = document.getElementById('status');
        status.textContent = '';
        const box = document.createElement('div');
        box.className = 'error';
        const p = document.createElement('p');
        p.textContent = `Failed to complete connection: ${error.message}`;
        box.appendChild(p);
        status.appendChild(box);
      }
    }

    completeOAuth();
  </script>
</body>
</html>
