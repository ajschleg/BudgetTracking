<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to BudgetTracking...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f8faf9;
            color: #1a1a1a;
            text-align: center;
        }
        .container { max-width: 400px; padding: 2rem; }
        .spinner {
            width: 40px; height: 40px; margin: 0 auto 1rem;
            border: 3px solid #e5e5e5;
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h2 { font-size: 1.2rem; margin-bottom: 0.5rem; }
        p { color: #666; font-size: 0.9rem; }
        a { color: #10b981; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Redirecting to BudgetTracking...</h2>
        <p>If the app doesn't open automatically, <a id="manual-link" href="#">click here</a>.</p>
    </div>

    <script>
        // Capture the full redirect URI (includes oauth_state_id from Plaid/bank)
        const fullRedirectURI = window.location.href;
        const appURL = `budgettracking://plaid-oauth?redirect_uri=${encodeURIComponent(fullRedirectURI)}`;

        // Set manual fallback link
        document.getElementById('manual-link').href = appURL;

        // Auto-redirect to the app via custom URL scheme
        window.location.href = appURL;
    </script>
</body>
</html>
